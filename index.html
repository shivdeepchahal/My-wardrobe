<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>My Wardrobe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#f0ece4;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.screen{animation:fadeIn 0.2s ease;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select{font-family:inherit;outline:none;}
select option{background:#1a1a1a;color:#f0ece4;}
::-webkit-scrollbar{display:none;}

.home{min-height:100vh;background:linear-gradient(160deg,#0c0c0c 0%,#1a1208 55%,#0c0c0c 100%);padding:64px 32px 44px;display:flex;flex-direction:column;justify-content:center;}
.home-tag{font-size:10px;font-weight:700;letter-spacing:0.25em;color:#c9a84c;margin-bottom:18px;}
.home-title{font-size:64px;font-weight:900;line-height:0.9;letter-spacing:-0.04em;margin-bottom:18px;}
.home-subtitle{font-size:14px;color:#6a6460;line-height:1.6;margin-bottom:40px;}
.home-stats{display:flex;align-items:center;gap:28px;margin-bottom:48px;}
.stat-box{display:flex;flex-direction:column;}
.stat-num{font-size:34px;font-weight:800;color:#c9a84c;line-height:1;}
.stat-label{font-size:10px;color:#6a6460;letter-spacing:0.12em;margin-top:5px;}
.stat-div{width:1px;height:36px;background:#222;}
.weather-strip{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#161410;border:1px solid #2a2218;border-radius:10px;margin-bottom:28px;}
.weather-icon{font-size:22px;}
.weather-temp{font-size:14px;font-weight:700;}
.weather-desc{font-size:11px;color:#6a6460;margin-top:2px;}
.weather-advice{font-size:11px;color:#c9a84c;font-weight:600;}

.btn-primary{width:100%;padding:16px 0;background:#c9a84c;border-radius:13px;color:#0a0a0a;font-size:15px;font-weight:700;margin-bottom:12px;}
.btn-ghost{width:100%;padding:15px 0;background:transparent;border:1px solid #252525;border-radius:13px;color:#6a6460;font-size:15px;margin-bottom:12px;}
.btn-primary:active{opacity:0.8;}.btn-ghost:active{opacity:0.6;}

.page{min-height:100vh;background:#0f0f0f;padding-bottom:48px;}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 18px;border-bottom:1px solid #181818;margin-bottom:20px;}
.back-btn{background:#1a1a1a;border-radius:9px;color:#f0ece4;font-size:17px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.page-title{font-size:17px;font-weight:700;}
.add-btn{background:#c9a84c;border-radius:9px;color:#0a0a0a;font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;}

.nav-tabs{display:flex;border-bottom:1px solid #181818;margin-bottom:20px;}
.nav-tab{flex:1;padding:10px 0;font-size:12px;font-weight:600;color:#6a6460;background:transparent;border-bottom:2px solid transparent;letter-spacing:0.05em;}
.nav-tab.active{color:#c9a84c;border-bottom-color:#c9a84c;}

.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px;}
.cat-chip{flex-shrink:0;padding:6px 14px;background:#161616;border:1px solid #222;border-radius:20px;color:#6a6460;font-size:12px;font-weight:500;white-space:nowrap;}
.cat-chip.active{background:#c9a84c;border-color:#c9a84c;color:#0a0a0a;font-weight:700;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;}
.item-card{background:#131313;border-radius:13px;overflow:hidden;border:1px solid #1c1c1c;}
.item-img-wrap{position:relative;aspect-ratio:1;overflow:hidden;background:#1a1a1a;}
.item-img{width:100%;height:100%;object-fit:cover;display:block;}
.remove-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.72);border-radius:50%;color:#f0ece4;width:26px;height:26px;font-size:17px;display:flex;align-items:center;justify-content:center;}
.item-name{padding:8px 10px 2px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-cat{padding:0 10px 8px;font-size:11px;color:#c9a84c;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-text{color:#6a6460;font-size:14px;line-height:1.6;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:flex-end;z-index:100;}
.modal{width:100%;background:#131313;border-radius:22px 22px 0 0;padding:28px 22px 50px;border-top:1px solid #222;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.modal-hint{font-size:12px;color:#6a6460;margin-bottom:20px;line-height:1.5;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.cat-btn{padding:10px 6px;background:#1a1a1a;border:1px solid #242424;border-radius:10px;color:#6a6460;font-size:11px;font-weight:500;text-align:center;line-height:1.3;}
.cat-btn.active{background:#c9a84c;border-color:#c9a84c;color:#0a0a0a;font-weight:700;}
.upload-zone{width:100%;min-height:110px;background:#1a1a1a;border:2px dashed #2a2a2a;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;padding:20px;}
.upload-icon{font-size:30px;margin-bottom:8px;}
.upload-text{color:#6a6460;font-size:13px;text-align:center;line-height:1.6;}
.upload-text span{color:#c9a84c;font-weight:600;}
.confirm-box{background:#1a1508;border:1px solid #3a2a08;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.confirm-check{width:44px;height:44px;background:#c9a84c;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.confirm-count{font-size:16px;font-weight:700;color:#c9a84c;}
.confirm-detail{font-size:12px;color:#6a6460;margin-top:3px;}
.add-more-btn{width:100%;padding:11px;background:transparent;border:1px dashed #2a2a2a;border-radius:10px;color:#6a6460;font-size:13px;margin-bottom:16px;}
.modal-btns{display:flex;gap:10px;}
.btn-ghost-sm{flex:1;padding:13px 0;background:transparent;border:1px solid #252525;border-radius:11px;color:#6a6460;font-size:14px;}
.btn-primary-sm{flex:1;padding:13px 0;background:#c9a84c;border-radius:11px;color:#0a0a0a;font-size:14px;font-weight:700;}
.uploading-box{display:flex;flex-direction:column;align-items:center;padding:36px 0;gap:14px;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid #1e1e1e;border-top-color:#c9a84c;animation:spin 0.75s linear infinite;}

.sec-label{font-size:10px;font-weight:700;letter-spacing:0.18em;color:#6a6460;padding:0 20px;margin-bottom:12px;display:block;text-transform:uppercase;}
.occ-list{padding:0 20px;margin-bottom:24px;}
.occ-card{width:100%;display:flex;align-items:center;gap:14px;padding:15px 17px;margin-bottom:10px;background:#131313;border:1px solid #1c1c1c;border-radius:14px;cursor:pointer;color:#f0ece4;}
.occ-card.active{border-color:#c9a84c;background:#150f02;}
.occ-icon{font-size:22px;width:32px;text-align:center;}
.occ-label{flex:1;font-size:15px;font-weight:500;}
.occ-check{color:#c9a84c;font-weight:700;}
.weather-card{margin:0 20px 24px;padding:14px 16px;background:#131313;border:1px solid #1c1c1c;border-radius:14px;display:flex;align-items:center;gap:12px;}
.weather-big{font-size:30px;}
.weather-city{font-size:10px;color:#6a6460;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px;}
.weather-main{font-size:15px;font-weight:700;}
.weather-sub{font-size:12px;color:#c9a84c;margin-top:3px;font-weight:500;}
.warning-box{background:#140f02;border:1px solid #2a2008;border-radius:11px;padding:13px 15px;font-size:13px;color:#c9a84c;line-height:1.5;}
.link-btn{background:none;color:#c9a84c;font-weight:700;font-size:13px;text-decoration:underline;padding:0;}
.preview-scroll{display:flex;gap:8px;overflow-x:auto;margin-top:10px;}
.preview-thumb{flex-shrink:0;width:52px;height:52px;border-radius:8px;overflow:hidden;border:1px solid #222;background:#1a1a1a;}
.preview-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.preview-more{flex-shrink:0;width:52px;height:52px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#6a6460;font-size:11px;font-weight:600;}
.gen-pad{padding:0 20px;}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;}
.loading-text{color:#6a6460;font-size:14px;}
.loading-sub{font-size:12px;color:#c9a84c;font-style:italic;}
.error-box{margin:40px 20px;padding:20px;border-radius:13px;background:#140808;border:1px solid #2a1010;color:#ff6b6b;font-size:14px;line-height:1.6;}
.result-wrap{padding:0 20px;}
.occ-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:#150f02;border:1px solid #2a2008;color:#c9a84c;font-size:11px;font-weight:600;margin-bottom:14px;}
.result-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.outfit-name{font-size:26px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;flex:1;padding-right:10px;}
.btn-fav{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:8px 12px;font-size:13px;color:#8a8478;white-space:nowrap;}
.btn-fav.saved{background:#1a1508;border-color:#c9a84c;color:#c9a84c;}
.score-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.score-bar{flex:1;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.score-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c97a);border-radius:3px;}
.score-text{font-size:11px;color:#c9a84c;font-weight:700;white-space:nowrap;}
.outfit-items{margin-bottom:18px;}
.outfit-item{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid #161616;}
.outfit-thumb{width:50px;height:50px;border-radius:9px;object-fit:cover;border:1px solid #222;flex-shrink:0;display:block;background:#1a1a1a;}
.outfit-thumb-ph{width:50px;height:50px;border-radius:9px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.outfit-item-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.outfit-item-cat{font-size:11px;color:#c9a84c;}
.info-card{background:#131313;border:1px solid #1c1c1c;border-radius:13px;padding:15px;margin-bottom:11px;}
.tip-card{border-color:#251a04;background:#0e0a01;}
.colour-card{border-color:#04201a;background:#010e0a;}
.info-card-title{font-size:10px;font-weight:700;letter-spacing:0.15em;color:#6a6460;margin-bottom:8px;text-transform:uppercase;}
.info-card-text{font-size:13px;line-height:1.65;color:#b8b4ac;}

.fav-list{padding:0 20px;}
.fav-card{background:#131313;border:1px solid #1c1c1c;border-radius:13px;padding:15px;margin-bottom:12px;}
.fav-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.fav-name{font-size:15px;font-weight:700;}
.fav-occ{font-size:11px;color:#c9a84c;margin-top:2px;}
.fav-items-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;}
.fav-thumb{flex-shrink:0;width:44px;height:44px;border-radius:7px;object-fit:cover;border:1px solid #222;display:block;background:#1a1a1a;}
.fav-thumb-ph{flex-shrink:0;width:44px;height:44px;border-radius:7px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:16px;}
.fav-tip{font-size:12px;color:#6a6460;line-height:1.5;}
.delete-fav{background:#1a0a0a;border:1px solid #2a1010;border-radius:8px;color:#ff6b6b;font-size:11px;padding:5px 10px;font-weight:600;}
.hidden{display:none;}
</style>
</head>
<body>
<div id="app"></div>
<!-- File input lives permanently in DOM, never re-rendered -->
<input type="file" id="file-input" accept="image/*" multiple style="position:fixed;top:-999px;left:-999px;width:1px;height:1px;opacity:0;"/>
<script>
var OCCASIONS=['Work / Professional','Smart Casual','Date / Night Out','Formal / Event'];
var OCC_ICONS={'Work / Professional':'💼','Smart Casual':'🌿','Date / Night Out':'🌙','Formal / Event':'🎩'};
var CATEGORIES=['Knitwear','Jackets','Polo Shirts','Shirts','Trousers','Shoes','Suits','Ties & Accessories','Outerwear / Coats','T-Shirts','Hoodies','Casual Active Wear'];
var IMGBB_KEY='bc57cebe31c9c5be40beca6b8199b0b1';

function autoName(cat){
  var n=state.wardrobe.filter(function(i){return i.category===cat;}).length+1;
  return cat+' #'+n;
}

var state={
  screen:'home',
  wardrobeTab:'items',
  wardrobe:JSON.parse(localStorage.getItem('wrd_items')||'[]'),
  favourites:JSON.parse(localStorage.getItem('wrd_favs')||'[]'),
  selectedOccasion:null,
  outfit:null,
  loading:false,
  addingItem:false,
  pendingCount:0,
  pendingImages:[],
  newCategory:'Shirts',
  activeCategory:'All',
  weather:null,
};

function save(){
  localStorage.setItem('wrd_items',JSON.stringify(state.wardrobe));
  localStorage.setItem('wrd_favs',JSON.stringify(state.favourites));
}

function setState(updates){Object.assign(state,updates);render();}

function isOutfitSaved(){
  if(!state.outfit) return false;
  return state.favourites.some(function(f){return f.outfit_name===state.outfit.outfit_name&&f.occasion===state.selectedOccasion;});
}

function toggleFav(){
  if(!state.outfit) return;
  if(isOutfitSaved()){
    state.favourites=state.favourites.filter(function(f){return !(f.outfit_name===state.outfit.outfit_name&&f.occasion===state.selectedOccasion);});
  } else {
    state.favourites.push(Object.assign({},state.outfit,{occasion:state.selectedOccasion,savedAt:Date.now()}));
  }
  save();render();
}

// ── WEATHER ──────────────────────────────────────────────────────
function fetchWeather(){
  if(state.weather) return;
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-27.4698&longitude=153.0251&current=temperature_2m,weathercode,apparent_temperature&timezone=Australia%2FBrisbane')
  .then(function(r){return r.json();})
  .then(function(d){
    var c=d.current,code=c.weathercode;
    var icon='☀️',desc='Clear';
    if(code===0){icon='☀️';desc='Sunny';}
    else if(code<=2){icon='⛅';desc='Partly cloudy';}
    else if(code<=3){icon='☁️';desc='Overcast';}
    else if(code<=67){icon='🌧️';desc='Rainy';}
    else{icon='⛈️';desc='Stormy';}
    var temp=Math.round(c.temperature_2m);
    var feel=Math.round(c.apparent_temperature);
    var advice=temp<16?'Layer up — cold today':temp<22?'Light layers work well':temp<28?'Comfortable — dress as planned':'It\'s warm — breathable fabrics';
    state.weather={icon:icon,desc:desc,temp:temp,feel:feel,advice:advice};
    render();
  }).catch(function(){});
}

// ── COMPRESS ─────────────────────────────────────────────────────
function compressImage(file,callback){
  var blobUrl=URL.createObjectURL(file);
  var img=new Image();
  img.onload=function(){
    var MAX=400,w=img.width,h=img.height;
    if(w>=h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    else if(h>w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
    var canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    var dataUrl=canvas.toDataURL('image/jpeg',0.60);
    URL.revokeObjectURL(blobUrl);
    callback(dataUrl);
  };
  img.onerror=function(){URL.revokeObjectURL(blobUrl);callback(null);};
  img.src=blobUrl;
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  var app=document.getElementById('app');
  if(!app) return;
  if(state.screen==='home') app.innerHTML=renderHome();
  else if(state.screen==='wardrobe') app.innerHTML=renderWardrobe();
  else if(state.screen==='generate') app.innerHTML=renderGenerate();
  else if(state.screen==='result') app.innerHTML=renderResult();
  attachEvents();
}

function renderHome(){
  var w=state.weather;
  var ws=w?('<div class="weather-strip"><span class="weather-icon">'+w.icon+'</span><div><div class="weather-temp">Brisbane · '+w.temp+'°C · '+w.desc+'</div><div class="weather-advice">'+w.advice+'</div></div></div>'):'';
  return '<div class="home screen">'+
    '<div class="home-tag">PERSONAL STYLE · BRISBANE</div>'+
    '<h1 class="home-title">MY<br>WARD<br>ROBE</h1>'+
    '<p class="home-subtitle">AI outfit generation from your own collection</p>'+
    ws+
    '<div class="home-stats">'+
      '<div class="stat-box"><span class="stat-num">'+state.wardrobe.length+'</span><span class="stat-label">ITEMS</span></div>'+
      '<div class="stat-div"></div>'+
      '<div class="stat-box"><span class="stat-num">'+state.favourites.length+'</span><span class="stat-label">SAVED</span></div>'+
      '<div class="stat-div"></div>'+
      '<div class="stat-box"><span class="stat-num">'+OCCASIONS.length+'</span><span class="stat-label">OCCASIONS</span></div>'+
    '</div>'+
    '<button class="btn-primary" id="go-generate">✨ Generate Outfit</button>'+
    '<button class="btn-ghost" id="go-wardrobe">Manage Wardrobe</button>'+
  '</div>';
}

function renderWardrobe(){
  var isItems=state.wardrobeTab==='items';
  var filtered=state.activeCategory==='All'?state.wardrobe:state.wardrobe.filter(function(i){return i.category===state.activeCategory;});
  var chips=['All'].concat(CATEGORIES).map(function(c){
    var count=c==='All'?'':' ('+state.wardrobe.filter(function(i){return i.category===c;}).length+')';
    return '<button class="cat-chip'+(state.activeCategory===c?' active':'')+'" data-cat="'+c+'">'+c+count+'</button>';
  }).join('');

  var grid=filtered.length===0?
    '<div class="empty"><div class="empty-icon">👔</div><p class="empty-text">No items yet.<br>Tap + to add clothes.</p></div>':
    '<div class="grid">'+filtered.map(function(item){
      return '<div class="item-card">'+
        '<div class="item-img-wrap">'+
          '<img class="item-img" src="'+item.imagePreview+'" alt="'+item.name+'"/>'+
          '<button class="remove-btn" data-id="'+item.id+'">×</button>'+
        '</div>'+
        '<div class="item-name">'+item.name+'</div>'+
        '<div class="item-cat">'+item.category+'</div>'+
      '</div>';
    }).join('')+'</div>';

  var modal='';
  if(state.addingItem){
    var catBtns=CATEGORIES.map(function(c){
      return '<button class="cat-btn'+(state.newCategory===c?' active':'')+'" data-selcat="'+c+'">'+c+'</button>';
    }).join('');

    if(state.addingItem==='uploading'){
      modal='<div class="modal-overlay"><div class="modal">'+
        '<div class="uploading-box">'+
          '<div class="spinner"></div>'+
          '<div style="font-size:15px;font-weight:700;">Saving items…</div>'+
          '<div style="font-size:12px;color:#6a6460;">Please wait</div>'+
        '</div></div></div>';
    } else {
      var uploadSection=state.pendingImages.length>0?
        '<div class="confirm-box">'+
          '<div class="confirm-check">✓</div>'+
          '<div>'+
            '<div class="confirm-count">'+state.pendingImages.length+' photo'+(state.pendingImages.length>1?'s':'')+' ready</div>'+
            '<div class="confirm-detail">Category: '+state.newCategory+'</div>'+
          '</div>'+
        '</div>'+
        '<button id="trigger-upload" class="add-more-btn" style="display:block;width:100%;text-align:center;">+ Add more photos</button>':
        '<button id="trigger-upload" class="upload-zone" style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">'+
          '<div class="upload-icon">📸</div>'+
          '<div class="upload-text">Tap to upload photos<br><span>Select multiple at once</span></div>'+
        '</button>';

      modal='<div class="modal-overlay" id="modal-overlay">'+
        '<div class="modal">'+
          '<div class="modal-title">Add Clothes</div>'+
          '<div class="modal-hint">Pick a category → upload photos. Auto-named.</div>'+
          '<div class="cat-grid">'+catBtns+'</div>'+
          uploadSection+
          '<div class="modal-btns">'+ 
            '<button class="btn-ghost-sm" id="cancel-add">Cancel</button>'+
            '<button class="btn-primary-sm" id="save-items">Save'+(state.pendingImages.length>0?' '+state.pendingImages.length+' item'+(state.pendingImages.length>1?'s':''):' items')+'</button>'+
          '</div>'+
        '</div>'+
      '</div>';
    }
  }

  var favsView=state.favourites.length===0?

      '<span class="page-title">My Wardrobe</span>'+

    '<div class="nav-tabs">'+
      '<button class="nav-tab'+(isItems?' active':'')+'" id="tab-items">ITEMS ('+state.wardrobe.length+')</button>'+
      '<button class="nav-tab'+(!isItems?' active':'')+'" id="tab-favs">SAVED ('+state.favourites.length+')</button>'+
    '</div>'+
    (isItems?'<div class="cat-scroll">'+chips+'</div>'+grid:favsView)+
    modal+
  '</div>';
}

      '<button class="btn-ghost" id="go-home">Back to Home</button>'+

// ── EVENTS ───────────────────────────────────────────────────────
function attachEvents(){
  function on(id,fn){var el=document.getElementById(id);if(el)el.addEventListener('click',fn);}
  on('go-home',function(){setState({screen:'home'});});
  on('go-wardrobe',function(){setState({screen:'wardrobe',wardrobeTab:'items'});});
  on('go-wardrobe2',function(){setState({screen:'wardrobe',wardrobeTab:'items'});});
  on('go-generate',function(){setState({screen:'generate'});});
  on('tab-items',function(){setState({wardrobeTab:'items'});});
  on('tab-favs',function(){setState({wardrobeTab:'favourites'});});
  on('toggle-fav',function(){toggleFav();});
  on('open-add',function(){setState({addingItem:true,pendingImages:[],newCategory:'Shirts'});});
  on('cancel-add',function(){setState({addingItem:false,pendingImages:[]});});

  document.querySelectorAll('.cat-chip').forEach(function(el){el.addEventListener('click',function(){setState({activeCategory:el.dataset.cat});});});
  document.querySelectorAll('.occ-card').forEach(function(el){el.addEventListener('click',function(){setState({selectedOccasion:el.dataset.occ});});});
  document.querySelectorAll('.cat-btn').forEach(function(el){el.addEventListener('click',function(){setState({newCategory:el.dataset.selcat});});});
  document.querySelectorAll('.remove-btn').forEach(function(el){el.addEventListener('click',function(){state.wardrobe=state.wardrobe.filter(function(i){return i.id!=el.dataset.id;});save();render();});});
  document.querySelectorAll('.delete-fav').forEach(function(el){el.addEventListener('click',function(){state.favourites.splice(parseInt(el.dataset.fidx),1);save();render();});});

  // Trigger permanent file input
  on('trigger-upload',function(){
    document.getElementById('file-input').click();
  });

  // Save — upload already-compressed images to ImgBB
  on('save-items',function(){
    if(state.pendingImages.length===0){alert('Please upload at least one photo.');return;}
    // Check if still reading files
    var stillTemp=state.pendingImages.some(function(i){return i.temp;});
    if(stillTemp){alert('Still processing photos, please wait a moment.');return;}
    setState({addingItem:'uploading'});
    var images=state.pendingImages.slice();
    var cat=state.newCategory;
    var idx=0;
    function uploadNext(){
      if(idx>=images.length){save();setState({addingItem:false,pendingImages:[]});return;}
      var img=images[idx];idx++;
      // Compress via canvas before uploading
      var image=new Image();
      image.onload=function(){
        var MAX=400,w=image.width,h=image.height;
        if(w>=h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        else if(h>w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        var canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(image,0,0,w,h);
        var b64=canvas.toDataURL('image/jpeg',0.65).split(',')[1];
        var fd=new FormData();
        fd.append('image',b64);
        fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY,{method:'POST',body:fd})
        .then(function(r){return r.json();})
        .then(function(data){
          var url=(data&&data.data&&(data.data.display_url||data.data.url))||null;
          state.wardrobe.push({name:autoName(cat),category:cat,imagePreview:url||('data:image/jpeg;base64,'+b64),id:Date.now()+Math.random()});
          uploadNext();
        })
        .catch(function(){
          state.wardrobe.push({name:autoName(cat),category:cat,imagePreview:'data:image/jpeg;base64,'+b64,id:Date.now()+Math.random()});
          uploadNext();
        });
      };
      image.onerror=function(){uploadNext();};
      image.src=img.compressed;
    }
    uploadNext();
  });

  // Close modal on overlay tap
  var ov=document.getElementById('modal-overlay');
  if(ov)ov.addEventListener('click',function(e){if(e.target===ov)setState({addingItem:false,pendingImages:[]});});

  // Generate outfit
  on('do-generate',function(){
    if(!state.selectedOccasion||state.wardrobe.length<2) return;
    setState({screen:'result',loading:true,outfit:null});
    var items=state.wardrobe.map(function(i){return '- '+i.name+' ('+i.category+')';}).join('\n');
    var wCtx=state.weather?'Brisbane weather: '+state.weather.temp+'°C, '+state.weather.desc+'. '+state.weather.advice+'.':'Brisbane subtropical climate.';
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:
          'You are a sharp men\'s personal stylist. Smart/Professional vibe. Mixed colour wardrobe.\n\n'+wCtx+'\n\nWardrobe:\n'+items+'\n\nOccasion: '+state.selectedOccasion+'\n\nCreate ONE outfit using ONLY items listed. Respond ONLY in valid JSON, no markdown:\n{"outfit_name":"catchy name","items":["exact name","exact name"],"why_it_works":"2 sentences","colour_tip":"colour coordination tip","style_tip":"one specific tip","confidence_score":88}'
        }]
      })
    })
    .then(function(r){return r.json();})
    .then(function(data){
      var text=(data.content&&data.content.find(function(b){return b.type==='text';}))||{text:'{}'};
      var parsed=JSON.parse(text.text.replace(/```json|```/g,'').trim());
      setState({loading:false,outfit:parsed});
    })
    .catch(function(){setState({loading:false,outfit:{error:true}});});
  });
}

// ── INIT ─────────────────────────────────────────────────────────
// Attach file input listener ONCE - permanent, never re-rendered
document.getElementById('file-input').addEventListener('change',function(){
  var files=Array.from(this.files);
  if(!files.length) return;
  var done=0;
  var total=files.length;
  files.forEach(function(file){
    // Step 1: show instant blob preview
    var blobUrl=URL.createObjectURL(file);
    var tempId=Date.now()+Math.random();
    state.pendingImages.push({compressed:blobUrl,blobUrl:blobUrl,id:tempId,temp:true});
    render();
    // Step 2: read as dataURL in background for actual storage
    var reader=new FileReader();
    reader.onloadend=function(){
      // Replace temp blob entry with real dataURL
      var idx=state.pendingImages.findIndex(function(i){return i.id===tempId;});
      if(idx>-1 && reader.result){
        state.pendingImages[idx]={compressed:reader.result,id:tempId};
      }
      done++;
      if(done===total) render();
    };
    reader.readAsDataURL(file);
  });
  this.value='';
});

fetchWeather();
render();
